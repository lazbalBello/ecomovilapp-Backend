server:
  port: 8084
  shutdown: GRACEFUL
  netty:
    connection-timeout: 2000
    compression:
        enabled: true
        mime-types: application/json,text/css,application/javascript
        min-response-size: 2048

spring:
    application:
        name: Seguimiento-Distribucion-Reactivo
    threads:
      virtual:
        enabled: true
    kafka:
        bootstrap-servers: localhost:9094
        properties:
            schema.registry.url: http://localhost:8086
            fetch.min.bytes: 1024
            fetch.max.wait.ms: 500
            retries: 3
            retry.backoff.ms: 1000
        admin:
            fail-fast: false

    data:
        redis:
            host: localhost
            port: 6379
            password: ${REDIS_PASSWORD}
            lettuce:
                pool:
                    max-active: 20
                    max-idle: 10
                    min-idle: 2

    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: ${ISSUER}
                    jwk-set-uri: ${JWK_URL}

eureka:
    instance:
        hostname: localhost
        prefer-ip-address: true
    client:
        service-url:
            default-zone: http://localhost:8761/eureka
