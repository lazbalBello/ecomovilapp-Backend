server:
  port: 8083
  shutdown: GRACEFUL
  netty:
    connection-timeout: 2000
    compression:
        enabled: true
        mime-types: application/json,text/css,application/javascript
        min-response-size: 2048

spring:
    application:
        name: Seguimiento-Distribucion-Reactivo
    threads:
      virtual:
        enabled: true
    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
        properties:
            schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8086}
            fetch.min.bytes: 1024
            fetch.max.wait.ms: 500
            retries: 3
            retry.backoff.ms: 1000
        admin:
            fail-fast: false
    
    mqtt:
        url: ${MQTT_URL:tcp://localhost:1883}
        username: ${EMQX_USERNAME:servicio-distribucion}
        password: ${SERVICIO_DISTRIBUCION_PASSWORD:public}
        topics:
            admin: ${MQTT_TOPIC_ADMIN:vehiculos/%s/telemetria/admin}
            publico: ${MQTT_TOPIC_PUBLICO:vehiculos/%s/telemetria/publico}

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            password: ${REDIS_PASSWORD}
            lettuce:
                pool:
                    max-active: 20
                    max-idle: 10
                    min-idle: 2

    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: ${ISSUER}
                    jwk-set-uri: ${JWK_URL}

eureka:
    instance:
        hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
        prefer-ip-address: true
    client:
        service-url:
            defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
