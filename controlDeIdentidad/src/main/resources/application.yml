server:
  port: 8082

spring:
    application:
        name: controlDeIdentidad
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: ${ISSUER}
            jwk-set-uri: ${JWK_URL}

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/

#Variables de keycloak
Keycloak:
   server-url: ${SERVER_URL}
   realm-name: ${REALM_NAME}
   realm-master: ${REALM_MASTER}
   admin-cli: ${ADMIN_CLI}
   user-console: ${USER_CONSOLE}
   user-password: ${USER_PASSWORD}
   client-id: ${CLIENT_ID}
   client-secret: ${CLIENT_SECRET}
