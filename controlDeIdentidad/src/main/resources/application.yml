server:
  port: 8082

spring:
    jmx:
     enabled: false
    kafka:
      bootstrap-servers:
        - ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8086}
        retries: 3
        retry.backoff.ms: 1000
      admin:
        fail-fast: false
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
        properties:
          auto.register.schemas: true
      consumer:
        group-id: servicios-flota
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
        properties:
          specific.avro.reader: true
    application:
        name: controlDeIdentidad
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: ${ISSUER}
            jwk-set-uri: ${JWK_URL}

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

#Variables de keycloak
Keycloak:
   server-url: ${SERVER_URL}
   realm-name: ${REALM_NAME}
   realm-master: ${REALM_MASTER}
   admin-cli: ${ADMIN_CLI}
   user-console: ${USER_CONSOLE}
   user-password: ${USER_PASSWORD}
   client-id: ${CLIENT_ID}
   client-secret: ${CLIENT_SECRET}
