%% ==============================================================
%% ACL - Control de acceso MQTT para Ecomóviles
%% Tópicos: vehiculos/{vehiculoId}/telemetria/admin
%%          vehiculos/{vehiculoId}/telemetria/publico
%% ==============================================================

%% --- servicio-distribucion: solo puede PUBLICAR en ambos canales ---
{allow, {username, "servicio-distribucion"}, publish, ["vehiculos/+/telemetria/admin", "vehiculos/+/telemetria/publico"]}.
{deny,  {username, "servicio-distribucion"}, subscribe, ["$all"]}.

%% --- web-admin: solo puede SUSCRIBIRSE a ambos canales (telemetría completa) ---
{deny,  {username, "web-admin"}, publish, ["$all"]}.
{allow, {username, "web-admin"}, subscribe, ["vehiculos/+/telemetria/admin", "vehiculos/+/telemetria/publico"]}.

%% --- web-publico: solo puede SUSCRIBIRSE al canal público ---
{deny,  {username, "web-publico"}, publish, ["$all"]}.
{allow, {username, "web-publico"}, subscribe, ["vehiculos/+/telemetria/publico"]}.

%% --- Regla de cierre: denegar todo lo no permitido explícitamente ---
{deny, all}.