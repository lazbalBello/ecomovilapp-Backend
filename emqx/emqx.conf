# ==============================================================
# EMQX 5.4.1 — Configuración para flota de vehículos eléctricos
# NOTA: Sintaxis HOCON compatible con EMQX 5.x
# ==============================================================

# ====================== Nodo (campos obligatorios) ======================
node {
  data_dir = "/opt/emqx/data"
  # Cookie de seguridad para el cluster Erlang (nodo único en dev/prod single-node)
  cookie = "ecomoviles-emqx-secret-cookie"
}

# ====================== Listeners ======================
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 10000
  acceptors = 16
}

listeners.ws.default {
  bind = "0.0.0.0:1884"
  max_connections = 5000
  acceptors = 8
}

listeners.wss.default {
  bind = "0.0.0.0:1885"
  max_connections = 5000
  acceptors = 8
  # Descomentar cuando se dispongan certificados TLS:
  # ssl_options {
  #   certfile = "/opt/emqx/etc/certs/cert.pem"
  #   keyfile  = "/opt/emqx/etc/certs/key.pem"
  # }
}

# ====================== Autenticación ======================
# Usa la base de datos interna (usuarios creados por emqx-init via REST API)
authentication = [
  {
    mechanism = password_based
    backend = built_in_database
    user_id_type = username
  }
]

# ====================== Autorización (ACL) ======================
authorization {
  sources = [
    {
      type = file
      enable = true
      path = "/opt/emqx/etc/acl.conf"
    }
  ]
  no_match = deny
  deny_action = disconnect
}

# ====================== MQTT ======================
mqtt {
  max_packet_size = 1MB
  max_inflight    = 128
}

# ====================== Dashboard y API REST ======================
dashboard {
  listeners.http {
    bind = 18083
  }
}