services:
  db-gestion:
    container_name: db-gestion
    image: postgres:15.15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ms_gestion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Blb2401
    ports:
      - "5431:5431"
    expose:
      - 5431
    command:
      - "postgres"
      - "-p"
      - "5431"
      - "-c"
      - "listen_addresses=*"
    volumes:
      - gestion_postgres_data:/var/lib/postgresql/data
    networks:
        - app-network

  db-keycloak:
    container_name: db-keycloak
    image: postgres:15.15
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Blb2401
    ports:
      - "5433:5433"
    expose:
      - 5433
    command:
      - "postgres"
      - "-p"
      - "5433"
      - "-c"
      - "listen_addresses=*"
    volumes:
      - db_keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.2.4
    command: [ "start-dev" ]
    ports:
      - "9090:9090"
    expose:
      - 9090
    depends_on:
      - db-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5433/db_keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: Blb2401
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9090
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:9092,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
      - schema-registry
    environment:
      KAFKA_CLUSTERS_0_NAME: flota-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KRAFT: "true"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8086
    ports:
      - "8085:8080"
    networks:
      - app-network
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: schema-registry
    ports:
      - "8086:8086"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8086
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - kafka
    networks:
      - app-network

  emqx:
    image: emqx/emqx:5.4.1
    container_name: emqx
    ports:
      - "1883:1883"
      - "18083:18083"
      - "1884:1884"
      - "1885:1885"
    environment:
      EMQX_NODE_NAME: "emqx@node1.emqx.io"
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_MAX_CONNECTIONS: 200
      EMQX_LISTENER__TCP__EXTERNAL__ACCEPTORS: 4
      EMQX_LISTENER__TCP__EXTERNAL__MAX_CONNECTIONS: 500
      EMQX_MQTT__MAX_PACKET_SIZE: 1MB
      EMQX_MQTT__MAX_INFLIGHT: 100
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:1884"
      EMQX_LISTENERS__WSS__DEFAULT__BIND: "0.0.0.0:1885"
      EMQX_LISTENER__SSL__EXTERNAL__ENABLE: "false"
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      EMQX_LOG__LEVEL: warning
    env_file:
      - .env
    networks:
      - app-network
    volumes:
      - emqx_data:/opt/emqx/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes          
      --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    mem_limit: "128m"
    cpus: "0.2"

volumes:
  gestion_postgres_data:
  db_keycloak_postgres_data:
  keycloak_data:
  kafka_data:
  emqx_data:
  redis_data:

networks:
  app-network:
    driver: bridge
