services:
  # ==========================================
  # EDGE PROXY (REVERSE PROXY)
  # ==========================================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.tcp_gps.address=:5001" # Nuevo entrypoint para tráfico GPS TCP
      #- "--entrypoints.websecure.address=:443" # Para producción con TLS
    ports:
      - "80:80"
      - "8080:8080" # Dashboard Traefik (remover en Prod)
      - "5001:5001" # Exponer puerto TCP para los dispositivos hardware
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # INFRAESTRUCTURA (DATABASES / BROKERS)
  # ==========================================
  db-gestion:
    container_name: db-gestion
    image: postgres:15.15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ms_gestion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5431:5431"
    expose:
      - 5431
    env_file:
      - .env
    command:
      - "postgres"
      - "-p"
      - "5431"
      - "-c"
      - "listen_addresses=*"
    volumes:
      - gestion_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5431" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "512m"

  db-keycloak:
    container_name: db-keycloak
    image: postgres:15.15
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_KEYCLOAK_PASSWORD}
    env_file:
      - .env
    command:
      - "postgres"
      - "-p"
      - "5433"
      - "-c"
      - "listen_addresses=*"
    volumes:
      - db_keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5433" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "512m"

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.2.4
    command: [ "start-dev" ]
    ports:
      - "9090:9090"
    expose:
      - 9090
    depends_on:
      db-keycloak:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5433/db_keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${DB_KEYCLOAK_PASSWORD}
      KEYCLOAK_ADMIN: ${USER_CONSOLE}
      KEYCLOAK_ADMIN_PASSWORD: ${USER_PASSWORD}
      KC_HTTP_PORT: 9090
      KC_HOSTNAME_STRICT: "false"
    env_file:
      - .env
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9090 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "768m"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:9092,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9094:9094" # Acceso externo temporal antes de dockerizar
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 | grep -q 'ApiVersion' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "1g"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: flota-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KRAFT: "true"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8086
    ports:
      - "8085:8080" # Dashboard privado (Considerar usar VPN para acceso)
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "384m"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: schema-registry
    ports:
      - "8086:8086"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8086
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8086/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "512m"

  emqx:
    image: emqx/emqx:5.4.1
    container_name: emqx
    ports:
      - "1883:1883"   # MQTT Directo TCP (Hardware Flota)
      - "1884:1884"   # MQTT sobre WebSockets (Browsers)
      - "1885:1885"   # MQTT sobre WebSockets Seguro (WSS)
      - "18083:18083" # Dashboard EMQX
    environment:
      # Las credenciales del dashboard se mantienen dinámicas vía .env
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
    env_file:
      - .env
    networks:
      - app-network
    volumes:
      - emqx_data:/opt/emqx/data
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "emqx", "ctl", "status" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "512m"

  # Contenedor de inicialización: crea los usuarios MQTT en EMQX via REST API
  emqx-init:
    image: alpine:3.19
    container_name: emqx-init
    depends_on:
      emqx:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache curl jq
        
        echo "Esperando a que la API HTTP de EMQX este lista..."
        sleep 5
        
        # 1. Obtener JWT Token
        LOGIN_RES=$$(curl -s -X POST http://emqx:18083/api/v5/login \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"admin\",\"password\":\"$${EMQX_DASHBOARD_PASSWORD}\"}")
        
        TOKEN=$$(echo $$LOGIN_RES | jq -r '.token')
        if [ "$$TOKEN" = "null" ] || [ -z "$$TOKEN" ]; then
          echo "[ERROR] No se pudo obtener el token JWT de EMQX. Respuesta: $$LOGIN_RES"
          exit 1
        fi
        echo "[OK] Token JWT obtenido correctamente"

        BASE_URL="http://emqx:18083/api/v5/authentication/password_based:built_in_database/users"

        crear_usuario() {
          USER_ID=$$1
          PASSWORD=$$2
          HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 6 --retry-delay 5 --retry-connrefused --max-time 10 \
            -X POST "$$BASE_URL" \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"$$USER_ID\",\"password\":\"$$PASSWORD\"}")
          if [ "$$HTTP_CODE" = "201" ] || [ "$$HTTP_CODE" = "409" ]; then
            echo "[OK] Usuario '$$USER_ID' listo (HTTP $$HTTP_CODE)"
          else
            echo "[ERROR] Fallo creando '$$USER_ID' (HTTP $$HTTP_CODE)" && exit 1
          fi
        }

        echo "=== Inicializando usuarios MQTT en EMQX ==="
        crear_usuario "servicio-distribucion" "${SERVICIO_DISTRIBUCION_PASSWORD}"
        crear_usuario "web-admin"             "${WEB_ADMIN_PASSWORD}"
        crear_usuario "web-publico"           "${WEB_PUBLICO_PASSWORD}"
        echo "=== Inicializacion completada ==="
    networks:
      - app-network
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "128m"

  # ==========================================
  # MICROSERVICIOS ECOMÓVILES (BUILD DESDE MAVEN)
  # ==========================================
  servidor-registro:
    build:
      context: .
      dockerfile: servidorDeRegistroDeServicios/Dockerfile
    container_name: eureka-server
    environment:
      - SERVER_PORT=8761
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
    ports:
      - "8761:8761"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "384m"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      servidor-registro:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - EUREKA_URI=${EUREKA_URI}
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      - ISSUER=${ISSUER}
      - JWK_URL=${JWK_URL}
      - DISCOVERI_URI=http://eureka-server:8761
      - GESTION_URI=lb://Gestion
      - CONTROL_DE_IDENTIDAD_URI=lb://controlDeIdentidad
      - SEGUIMIENTO_DISTRIBUCION_REACTIVO_URI=lb://Seguimiento-Distribucion-Reactivo
      - ADMIN_SECRET=${ADMIN_SECRET}
      - USER_SECRET=${USER_SECRET}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - .env
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/`)"
      - "traefik.http.services.gateway.loadbalancer.server.port=8080"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "384m"

  control-de-identidad:
    build:
      context: .
      dockerfile: controlDeIdentidad/Dockerfile
    container_name: controlDeIdentidad
    depends_on:
      servidor-registro:
        condition: service_healthy
      db-keycloak:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      - EUREKA_URI=${EUREKA_URI}
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - SCHEMA_REGISTRY_URL=${SCHEMA_REGISTRY_URL}
      - SERVER_URL=http://keycloak:9090
      - ISSUER=${ISSUER}
      - JWK_URL=${JWK_URL}
    env_file:
      - .env
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "384m"

  gestion:
    build:
      context: .
      dockerfile: Gestion/Dockerfile
    container_name: Gestion
    depends_on:
      servidor-registro:
        condition: service_healthy
      db-gestion:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      - EUREKA_URI=${EUREKA_URI}
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      - DB_URL=jdbc:postgresql://db-gestion:5431/ms_gestion
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - SCHEMA_REGISTRY_URL=${SCHEMA_REGISTRY_URL}
      - ISSUER=${ISSUER}
      - JWK_URL=${JWK_URL}
    env_file:
      - .env
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "512m"

  ecomoviles-ingestor-reactivo:
    build:
      context: .
      dockerfile: Ecomoviles-Ingestor-Reactivo/Dockerfile
    container_name: ecomoviles-ingestor-reactivo
    depends_on:
      servidor-registro:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      - EUREKA_URI=${EUREKA_URI}
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - SCHEMA_REGISTRY_URL=${SCHEMA_REGISTRY_URL}
    env_file:
      - .env
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # Traefik Actuando como Balanceador TCP
      - "traefik.tcp.routers.ingestor.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.ingestor.entrypoints=tcp_gps"
      - "traefik.tcp.services.ingestor.loadbalancer.server.port=5001"
    deploy:
      mode: replicated
      replicas: 1 # Puedes escalar cambiando este número (p. ej., a 3) y Traefik hará Round-Robin TCP automáticamente.
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "384m"

  seguimiento-distribucion-reactivo:
    build:
      context: .
      dockerfile: Seguimiento-Distribucion-Reactivo/Dockerfile
    container_name: Seguimiento-Distribucion-Reactivo
    depends_on:
      servidor-registro:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
      emqx-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      - EUREKA_URI=${EUREKA_URI}
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - SCHEMA_REGISTRY_URL=${SCHEMA_REGISTRY_URL}
      - MQTT_URL=${MQTT_URL}
      - EMQX_USERNAME=${EMQX_USERNAME}
      - SERVICIO_DISTRIBUCION_PASSWORD=${SERVICIO_DISTRIBUCION_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ISSUER=${ISSUER}
      - JWK_URL=${JWK_URL}
    env_file:
      - .env
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "384m"

volumes:
  gestion_postgres_data:
  db_keycloak_postgres_data:
  keycloak_data:
  kafka_data:
  emqx_data:
  redis_data:

networks:
  app-network:
    driver: bridge
